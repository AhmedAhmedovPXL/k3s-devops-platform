apiVersion: apps/v1
kind: Deployment
metadata:
  name: mijnwebsite
  namespace: mijnwebsite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mijnwebsite
  template:
    metadata:
      labels:
        app: mijnwebsite
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: website-data
          mountPath: /usr/share/nginx/html
      volumes:
      - name: website-data
        persistentVolumeClaim:
          claimName: website-data
